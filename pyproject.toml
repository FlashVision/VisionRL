[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = [
    "E402",   # module-level import not at top (normal in notebooks)
    "E501",   # line too long (common in notebook plotting/display code)
    "E701",   # multiple statements on one line (colon)
    "E702",   # multiple statements on one line (semicolon)
    "E722",   # bare except
    "E741",   # ambiguous variable name (I, l common in math/RL)
    "F821",   # undefined name (cross-cell references in notebooks)
]
